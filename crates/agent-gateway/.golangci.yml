# golangci-lint v2 —— 网关 Go 代码检查基线（此前无 linter，选务实检查集）：govet/staticcheck/unused
# 管正确性与死代码，errcheck/ineffassign/misspell 做基础卫生。
# 生成代码（internal/proto/）不参与检查。
version: "2"

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - unused
    - errcheck
    - ineffassign
    - misspell
  exclusions:
    generated: lax
    rules:
      # 测试代码允许忽略清理类调用的返回值。
      - path: _test\.go
        linters: [errcheck]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
