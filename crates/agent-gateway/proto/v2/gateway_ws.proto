// v2 统一线协议（WebSocket+Protobuf）：/ws/v2（浏览器）、/ws/v2/agent（桌面端）、
// /ws/v2/terminal（终端数据面）三链路的帧壳。一条 WS 二进制消息承载一条帧，文本帧即协议错误；
// 首帧必须为 hello，鉴权失败以 close code 4401 关闭。业务载荷复用 v1 消息（三端唯一事实源，
// 永不弃用、编号只增不改），本文件仅新增帧壳与未曾 proto 化的网关本地载荷。
syntax = "proto3";

package liveagent.gateway.v2;

import "proto/v1/gateway.proto";

option go_package = "github.com/liveagent/agent-gateway/internal/proto/v2;gatewayv2";

// ---------------------------------------------------------------------------
// 握手
// ---------------------------------------------------------------------------

// ClientRole 区分 /ws/v2/terminal 上连接的所属端（该链路两端共用一条路径，靠 hello.role 区分）。
enum ClientRole {
  CLIENT_ROLE_UNSPECIFIED = 0;
  CLIENT_ROLE_BROWSER = 1;
  CLIENT_ROLE_AGENT = 2;
}

// ClientHello 是所有 v2 连接的第一帧。
message ClientHello {
  // 协议版本，当前恒为 2；未知版本被服务端拒绝。
  uint32 protocol_version = 1;
  ClientRole role = 2;
  // 网关访问令牌，服务端做常量时间比较。
  string token = 3;
  // 以下字段仅 CLIENT_ROLE_AGENT 使用（对应 v1 gRPC AuthRequest）。
  string agent_id = 4;
  string agent_version = 5;
  // 客户端标识（如 "webui" / "desktop"），仅用于观测与日志。
  string client_name = 6;
  string client_version = 7;
}

// ServerHello 是服务端对 ClientHello 的应答；ok=false 时随即关闭连接。
message ServerHello {
  bool ok = 1;
  string message = 2;
  // 仅 agent 角色返回（对应 v1 gRPC AuthResponse.session_id）。
  string session_id = 3;
  // 服务端 Unix 秒时间戳，供客户端校准。
  int64 server_time = 4;
  // 服务端心跳周期与消息大小上限，客户端应据此配置本地看门狗与分片。
  uint32 heartbeat_period_seconds = 5;
  uint64 max_message_bytes = 6;
}

// PingFrame / PongFrame 是应用层心跳：WS 控制帧 ping 探测网络栈，本帧探测页面 JS/事件循环存活。
message PingFrame {
  int64 timestamp = 1;
}

message PongFrame {
  int64 timestamp = 1;
}

// AckResult 是本地操作的通用确认应答（对应 v1 的 {"ok":true}）。
message AckResult {
  bool ok = 1;
}

// ---------------------------------------------------------------------------
// 浏览器链路（/ws/v2）
// ---------------------------------------------------------------------------

// WebClientFrame 为浏览器 → 网关方向的帧。除 agent_request 直通臂外，其余臂均为
// 网关本地操作（由网关自身状态应答，不经桌面端往返）。
message WebClientFrame {
  // 请求关联 id，客户端生成、响应帧回携；广播事件与心跳帧为空。
  string request_id = 1;

  oneof payload {
    ClientHello hello = 2;
    // 直通请求：网关校验白名单与限额后转发桌面端（request_id 按连接命名空间化防冲突）。
    liveagent.gateway.v1.GatewayEnvelope agent_request = 3;
    StatusGetRequest status_get = 4;
    liveagent.gateway.v1.ChatCommandRequest chat_command = 5;
    ChatPrepareRequest chat_prepare = 6;
    ChatSubscribeRequest chat_subscribe = 7;
    ChatUnsubscribeRequest chat_unsubscribe = 8;
    ChatActivitiesRequest chat_activities = 9;
    WorkspaceSubscribeRequest workspace_subscribe = 10;
    WorkspaceUnsubscribeRequest workspace_unsubscribe = 11;
    PongFrame pong = 12;
  }
}

// WebServerFrame 为网关 → 浏览器方向的帧。
message WebServerFrame {
  // 关联响应回填请求 id；服务端主动推送（广播/心跳）时为空。
  string request_id = 1;

  oneof payload {
    ServerHello hello = 2;
    // 直通响应：桌面端返回的 v1 信封（含 error=99 错误臂）。
    liveagent.gateway.v1.AgentEnvelope agent_response = 3;
    // 网关本地错误（鉴权、校验、离线等；对应 v1 的 type:"error" 信封）。
    liveagent.gateway.v1.ErrorResponse local_error = 4;
    PingFrame ping = 5;
    // status_get / chat_prepare 的响应与 status 广播共用，新旧客户端共享一个状态归一化器。
    StatusEvent status = 6;
    ChatSubscribeResult chat_subscribed = 7;
    ChatCommandAccepted chat_accepted = 8;
    ChatActivitiesResult chat_activities = 9;
    ChatStreamEvent chat_event = 10;
    ChatCommandUpdate chat_command_update = 11;
    ChatSubscriptionReset chat_subscription_reset = 12;
    ChatActivityEvent chat_activity = 13;
    AckResult ack = 14;
    ChatCancelResult chat_cancelled = 15;

    // 广播事件：session 层吐出的 v1 seam 消息零塑形直转。
    liveagent.gateway.v1.HistorySyncEvent history_event = 20;
    liveagent.gateway.v1.SettingsSyncEvent settings_event = 21;
    liveagent.gateway.v1.TerminalEvent terminal_event = 22;
    liveagent.gateway.v1.SftpEvent sftp_event = 23;
    liveagent.gateway.v1.ChatQueueEvent chat_queue_event = 24;
    liveagent.gateway.v1.TunnelStateSnapshot tunnel_state = 25;
    liveagent.gateway.v1.ManagedProcessSnapshot process_state = 26;
    liveagent.gateway.v1.WorkspaceActivityEvent workspace_activity = 27;
  }
}

// ---------------------------------------------------------------------------
// 桌面端链路（/ws/v2/agent，替代 v1 gRPC Authenticate + AgentConnect）
// ---------------------------------------------------------------------------

// AgentClientFrame 为桌面端 → 网关方向的帧。
message AgentClientFrame {
  oneof payload {
    ClientHello hello = 1;
    liveagent.gateway.v1.AgentEnvelope envelope = 2;
  }
}

// AgentServerFrame 为网关 → 桌面端方向的帧。
message AgentServerFrame {
  oneof payload {
    ServerHello hello = 1;
    liveagent.gateway.v1.GatewayEnvelope envelope = 2;
  }
}

// ---------------------------------------------------------------------------
// 终端链路（/ws/v2/terminal，两端共用；替代浏览器自定义二进制帧与 v1 gRPC AgentTerminalConnect）
// ---------------------------------------------------------------------------

// TerminalClientFrame 为客户端（浏览器或桌面端）→ 网关方向的帧。
message TerminalClientFrame {
  oneof payload {
    ClientHello hello = 1;
    liveagent.gateway.v1.TerminalStreamFrame frame = 2;
  }
}

// TerminalServerFrame 为网关 → 客户端方向的帧。
message TerminalServerFrame {
  oneof payload {
    ServerHello hello = 1;
    liveagent.gateway.v1.TerminalStreamFrame frame = 2;
  }
}

// ---------------------------------------------------------------------------
// 网关本地载荷（v1 JSON 协议时代以 Go 结构体/手写 map 存在，此处 proto 化）
// ---------------------------------------------------------------------------

// StatusGetRequest 请求网关侧运行状态快照（对应 v1 "status.get"）。
message StatusGetRequest {}

// StatusEvent 镜像 session.Status 的 JSON 形状（字段一一对应）。
message StatusEvent {
  bool online = 1;
  bool agent_ready = 2;
  bool chat_runtime_ready = 3;
  string agent_id = 4;
  string agent_version = 5;
  string session_id = 6;
  int64 connected_since = 7;
  int64 last_heartbeat = 8;
  string runtime_state = 9;
  int64 runtime_last_heartbeat = 10;
  string runtime_worker_id = 11;
  bool runtime_visible = 12;
  uint32 runtime_active_run_count = 13;
}

// ChatPrepareRequest 唤醒/探活桌面端 chat 运行时（对应 v1 "chat.prepare"）；响应为 StatusEvent。
message ChatPrepareRequest {
  string reason = 1;
}

// ChatSubscribeRequest 订阅会话事件流（对应 v1 "chat.subscribe"）。after_seq + stream_epoch
// 支持断线重放：epoch 不匹配或序号超界时服务端置 reset 并从头回放。
message ChatSubscribeRequest {
  string conversation_id = 1;
  int64 after_seq = 2;
  string stream_epoch = 3;
}

// ChatRunActivity 镜像 session.RunActivity 的 JSON 形状。
message ChatRunActivity {
  string run_id = 1;
  string state = 2;
  int64 started_seq = 3;
  // Unix 毫秒时间戳。
  int64 updated_at_ms = 4;
  string tool_status = 5;
  bool tool_status_is_compaction = 6;
  string client_request_id = 7;
  // 以下两个字段仅在 chat_activities 列表中填充。
  string conversation_id = 8;
  string workdir = 9;
}

// ChatRunSnapshot 镜像 session.RunSnapshot 的 JSON 形状。
message ChatRunSnapshot {
  string run_id = 1;
  int64 revision = 2;
  // 桌面端渲染快照，内容为动态 JSON（与 v1 一致按字符串携带，不建模）。
  string entries_json = 3;
  string tool_status = 4;
  bool tool_status_is_compaction = 5;
  int64 as_of_seq = 6;
}

// ChatSubscribeResult 是 chat_subscribe 的响应。
message ChatSubscribeResult {
  string conversation_id = 1;
  string stream_epoch = 2;
  int64 latest_seq = 3;
  bool reset = 4;
  ChatRunActivity activity = 5;
  ChatRunSnapshot snapshot = 6;
  // 回放的事件序列。载荷由 chatwire 塑形为深度动态 JSON，与 v1 一致按字节携带、不 proto 化
  // （重建模会分叉 chatwire 且对压缩后的二进制帧无实际收益）。
  repeated bytes events_json = 7;
}

// ChatUnsubscribeRequest 取消订阅（对应 v1 "chat.unsubscribe"）；响应 AckResult。
message ChatUnsubscribeRequest {
  string conversation_id = 1;
}

// ChatActivitiesRequest 查询运行中会话（对应 v1 "chat.activities"）；仅由网关状态应答，桌面端离线时亦可用。
message ChatActivitiesRequest {}

message ChatActivitiesResult {
  repeated ChatRunActivity running_conversations = 1;
}

// ChatStreamEvent 是订阅后推送的单条会话事件。
message ChatStreamEvent {
  string conversation_id = 1;
  // 事件序号（与 payload_json 内的 seq 一致，便于不解析载荷即可去重）。
  int64 seq = 2;
  bytes payload_json = 3;
}

// ChatCommandAccepted 是 chat_command 提交被接受的响应（对应 v1 chat.command 的应答形状）。
message ChatCommandAccepted {
  string run_id = 1;
  string conversation_id = 2;
  int64 accepted_seq = 3;
  bool deduped = 4;
}

// ChatCommandUpdate 推送命令的前置阶段结果（bound / queued_in_gui / failed），镜像 session.ChatCommandUpdate。
message ChatCommandUpdate {
  string run_id = 1;
  string client_request_id = 2;
  string conversation_id = 3;
  string phase = 4;
  string error_code = 5;
  string message = 6;
}

// ChatSubscriptionReset 通知客户端某会话流已被限流丢弃，需重新订阅（after_seq 断点续传）。
message ChatSubscriptionReset {
  string conversation_id = 1;
}

// ChatCancelResult 是 chat.cancel 的响应。
message ChatCancelResult {
  bool ok = 1;
  string run_id = 2;
  string conversation_id = 3;
}

// ChatActivityEvent 广播会话活动状态变化，镜像 session.ConversationActivityEvent。
message ChatActivityEvent {
  string conversation_id = 1;
  string run_id = 2;
  string client_request_id = 3;
  bool running = 4;
  string state = 5;
  string workdir = 6;
  int64 updated_at_ms = 7;
}

// WorkspaceSubscribeRequest 订阅工作区活动（对应 v1 "workspace.subscribe"）；响应 AckResult，事件经 workspace_activity 臂广播。
message WorkspaceSubscribeRequest {
  string workdir = 1;
}

// WorkspaceUnsubscribeRequest 取消订阅；响应 AckResult。
message WorkspaceUnsubscribeRequest {
  string workdir = 1;
}
